<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Türantrieb Konfigurator">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1A2D44">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231A2D44'/%3E%3Crect x='60' y='60' width='32' height='392' rx='10' fill='%23D95E1F'/%3E%3Ctext x='90' y='300' font-family='Arial' font-weight='900' font-size='140' fill='white'%3ETÜR%3C/text%3E%3C/svg%3E">
  <title>Türantrieb Konfigurator</title>
<style>
  :root {
    --bg:#F2F4F7; --panel:#fff; --primary:#1A2D44; --accent:#D95E1F;
    --accent-l:#FDF0EA; --border:#D2DAE3; --muted:#6B7A8D;
    --ok:#2A7A4B; --ok-l:#EAF7EF; --warn:#B45309; --warn-l:#FEF3C7;
    --geze:#005A9C; --geze-l:#E6F0FA;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:-webkit-fill-available}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--primary);
       min-height:100vh;padding-bottom:calc(var(--safe-bot)+24px);-webkit-font-smoothing:antialiased}
  button{-webkit-appearance:none;font-family:inherit;cursor:pointer}
  input[type=number]{font-size:16px;-moz-appearance:textfield;font-family:inherit}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

  /* Header */
  #hdr{padding-top:calc(var(--safe-top)+14px);padding-bottom:14px;padding-left:18px;padding-right:18px;
       display:flex;align-items:center;justify-content:space-between;transition:background .3s}
  #hdr.dormakaba{background:#1A2D44}
  #hdr.geze{background:#005A9C}
  #hdr-bar{width:5px;height:34px;border-radius:2px;flex-shrink:0;transition:background .3s}
  #hdr.dormakaba #hdr-bar{background:#D95E1F}
  #hdr.geze #hdr-bar{background:#FFC72C}
  #hdr-title{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.02em;margin-left:10px}
  #hdr-sub{color:rgba(255,255,255,.6);font-size:12px;margin-top:1px;margin-left:10px}
  #prog-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #prog-inner{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  #hdr.dormakaba #prog-inner{background:#1A2D44}
  #hdr.geze #prog-inner{background:#005A9C}
  #prog-pct{color:#fff;font-size:11px;font-weight:700}
  #prog-bar{height:3px;background:var(--border)}
  #prog-fill{height:100%;transition:width .3s,background .3s}

  /* Install banner */
  #install-banner{background:#0A84FF;padding:12px 16px;display:flex;align-items:center;gap:10px}
  #install-banner.hidden{display:none}
  #install-close{background:rgba(255,255,255,.2);border:none;border-radius:99px;padding:4px 10px;color:#fff;font-size:13px;font-weight:600;min-height:32px}

  /* Product switcher */
  #prod-switcher{padding:14px 14px 0;display:flex;gap:10px}
  .prod-tab{flex:1;padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:var(--panel);
            display:flex;flex-direction:column;align-items:center;gap:6px;transition:.15s;cursor:pointer}
  .prod-tab.active-dormakaba{border-color:#D95E1F;background:#FDF0EA}
  .prod-tab.active-geze{border-color:#005A9C;background:#E6F0FA}
  .prod-tab-icon{font-size:24px}
  .prod-tab-name{font-weight:700;font-size:13px;color:var(--primary)}
  .prod-tab-sub{font-size:11px;color:var(--muted)}
  .prod-tab.active-dormakaba .prod-tab-name{color:#D95E1F}
  .prod-tab.active-geze .prod-tab-name{color:#005A9C}

  /* Content */
  #content{padding:14px 14px 0}

  /* Alerts */
  .alert{border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
  .alert-ok{background:var(--ok-l);border:1px solid rgba(42,122,75,.25)}
  .alert-warn{background:var(--warn-l);border:1px solid rgba(180,83,9,.25)}
  .alert-info{background:#E6F0FA;border:1px solid rgba(0,90,156,.2)}
  .alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
  .alert-head{font-weight:700;font-size:14px}
  .alert-head.ok{color:var(--ok)}
  .alert-head.warn{color:var(--warn)}
  .alert-head.info{color:#005A9C}
  .alert-body{color:var(--muted);font-size:12px;margin-top:2px}

  /* Sections */
  .section{background:var(--panel);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(26,45,68,.08)}
  .sec-hdr{padding:13px 18px;display:flex;align-items:center;gap:10px}
  .sec-hdr.dormakaba{background:#1A2D44}
  .sec-hdr.geze{background:#005A9C}
  .sec-icon{font-size:18px}
  .sec-title{color:#fff;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
  .sec-body{padding:16px}

  /* Fields */
  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  .field-label{font-weight:600;font-size:14px;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .field-req{color:var(--accent);font-size:12px}
  .field-hint{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4}

  /* Inputs */
  .num-row{display:flex;align-items:center;gap:8px}
  .num-input{padding:12px 14px;border-radius:8px;border:2px solid var(--border);font-size:16px;width:130px;color:var(--primary);background:var(--panel);outline:none}
  .num-input:focus{border-color:var(--accent)}
  .num-unit{color:var(--muted);font-size:14px;font-weight:500}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0}

  /* Buttons */
  .btn-group{display:flex;flex-wrap:wrap;gap:8px}
  .opt-btn{padding:10px 14px;border-radius:8px;border:2px solid var(--border);background:var(--panel);color:var(--muted);
           font-weight:500;font-size:13px;display:flex;align-items:center;gap:5px;min-height:44px;transition:.12s}
  .opt-btn.sel-d{border-color:#D95E1F;background:#FDF0EA;color:#D95E1F;font-weight:700}
  .opt-btn.sel-g{border-color:#005A9C;background:#E6F0FA;color:#005A9C;font-weight:700}
  .opt-sub{font-size:11px;opacity:.75;font-weight:400}
  .chk-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);background:transparent;
           display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:900;color:transparent;transition:.12s}
  .opt-btn.sel-d .chk-box,.opt-btn.sel-g .chk-box{color:#fff}
  .opt-btn.sel-d .chk-box{background:#D95E1F;border-color:#D95E1F}
  .opt-btn.sel-g .chk-box{background:#005A9C;border-color:#005A9C}

  /* Sensor cards */
  .sensor-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .sensor-card{border:2px solid var(--border);border-radius:10px;padding:14px;background:var(--panel);cursor:pointer;transition:.12s}
  .sensor-card.sel-d{border-color:#D95E1F;background:#FDF0EA}
  .sensor-card.sel-g{border-color:#005A9C;background:#E6F0FA}
  .sensor-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .sensor-card-left{display:flex;align-items:center;gap:10px}
  .sensor-icon{font-size:20px}
  .sensor-name{font-weight:700;font-size:14px;color:var(--primary)}
  .sensor-tag{font-size:11px;font-weight:600;margin-top:1px}
  .dormakaba .sensor-tag{color:#D95E1F}
  .geze .sensor-tag{color:#005A9C}
  .sensor-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;
                display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;color:transparent;transition:.12s}
  .sensor-card.sel-d .sensor-check{background:#D95E1F;border-color:#D95E1F;color:#fff}
  .sensor-card.sel-g .sensor-check{background:#005A9C;border-color:#005A9C;color:#fff}
  .sensor-merkmale{display:none;padding-left:16px;margin-top:8px}
  .sensor-card.sel-d .sensor-merkmale,.sensor-card.sel-g .sensor-merkmale{display:block}
  .sensor-merkmale li{font-size:12px;color:var(--muted);margin-bottom:3px}

  /* Action buttons */
  .big-btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;
           min-height:52px;display:flex;align-items:center;justify-content:center;gap:8px}
  .big-btn:disabled{background:var(--border);cursor:not-allowed}
  .big-btn.dormakaba{background:#D95E1F}
  .big-btn.geze{background:#005A9C}
  .big-btn.dark{background:#1A2D44}

  /* Summary */
  #summary-panel{margin-top:14px;background:var(--panel);border-radius:12px;overflow:hidden;display:none}
  #summary-panel.visible{display:block}
  #summary-panel.dormakaba{border:2px solid #D95E1F}
  #summary-panel.geze{border:2px solid #005A9C}
  .sum-hdr{padding:12px 16px;color:#fff;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .sum-hdr.dormakaba{background:#D95E1F}
  .sum-hdr.geze{background:#005A9C}
  .sum-body{padding:16px}
  .sum-table{width:100%;border-collapse:collapse;font-size:13px}
  .sum-table tr{border-bottom:1px solid var(--border)}
  .sum-table td{padding:8px 4px;vertical-align:top}
  .sum-table td:first-child{color:var(--muted);font-weight:500;width:42%}
  .sum-table td:last-child{font-weight:600;color:var(--primary)}
  .norm-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .norm-badge{padding:3px 10px;color:#fff;border-radius:99px;font-size:11px;font-weight:600;background:#1A2D44}
  .norm-badge.warn{background:var(--warn)}
  .pdf-hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
</style>
</head>
<body>

<div id="hdr" class="dormakaba">
  <div style="display:flex;align-items:center">
    <div id="hdr-bar"></div>
    <div><div id="hdr-title">Türantrieb Konfigurator</div><div id="hdr-sub">Drehtür &middot; Konfiguration</div></div>
  </div>
  <div id="prog-ring">
    <div id="prog-inner"><span id="prog-pct">0%</span></div>
  </div>
</div>

<div id="install-banner">
  <span style="font-size:20px;flex-shrink:0">📲</span>
  <div style="flex:1"><div style="color:#fff;font-weight:700;font-size:13px">Als App installieren</div>
  <div style="color:rgba(255,255,255,.85);font-size:12px">Tippe auf <b>Teilen ⬆</b> &rarr; „Zum Home-Bildschirm"</div></div>
  <button id="install-close">✕</button>
</div>

<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
<div id="prod-switcher"></div>
<div id="content"></div>

<script>
// ─── Label Maps ───────────────────────────────────────────────────────────────
const LM_D = {
  modell:        { ed100:"ED 100 (bis 160 kg / 1100 mm)", ed250:"ED 250 (bis 400 kg / 1600 mm)" },
  fluegelanzahl: { "1":"Einflügelig", "2":"Zweiflügelig", esr:"ED ESR ½ – teilautomatisiert" },
  tuerart:       { standard:"Standardtür", brandschutz:"Brandschutztür (T30/T90)", rauchschutz:"Rauchschutztür (RS)" },
  betriebsart:   { low:"Low-Energy (EN 1154)", full:"Full-Energy (Vollautomatik)" },
  betriebsmodus: { auto:"Vollautomatik", assist:"Power-Assist", manuell:"Manuell mit Rückhalt" },
  montageart:    { "bg-gleit":"Bandgegenseite drückend · Gleitschiene", "bg-gestänge":"Bandgegenseite drückend · Normalgestänge", "bs-gleit":"Bandseite ziehend · Gleitschiene" },
  verkleidung:   { basic:"BASIC", professionell:"PROFESSIONELL (VARIO)" },
  oeffnungswinkel:{ "80":"80°","90":"90°","110":"110° (max.)" },
  windlast:      { ja:"Aktiviert", nein:"Deaktiviert" },
  notfunktion:   { notstrom:"Notstromversorgung (24V)", batterie:"Batterie-Backup", keine:"Keine" },
  farbgebung:    { silber:"Silber (Standard)", weiss:"Weiß RAL 9016", bronze:"Bronze", individuell:"RAL individuell" },
  sensorFarbe:   { alu:"Aluminium", weiss:"Weiß", schwarz:"Schwarz" },
};
const LM_G = {
  variante: {
    std:"Powerturn Standard",
    f:"Powerturn F (Feststellung, 1-flg.)",
    fis:"Powerturn F-IS (Feststellung + Schließfolge, 2-flg.)",
    fr:"Powerturn F/R (Feststellung + Rauchschalter, 1-flg.)",
    fris:"Powerturn F/R-IS (Feststellung + Rauchschalter + IS, 2-flg.)",
    frists:"Powerturn F/R-IS/TS (vollständiges System, 2-flg.)",
    ists:"Powerturn IS/TS (teilautomatisiert, 2-flg.)",
  },
  tuerart:       { standard:"Standardtür", brandschutz:"Brandschutztür (T30/T90)", rauchschutz:"Rauchschutztür (RS)", flucht:"Flucht- und Rettungswegtür" },
  betriebsart:   { auto:"Vollautomatik", low:"Low-Energy", servo:"Servo (Smart Swing)" },
  montageart:    { "bgs-g":"Kopfmontage BGS mit Gestänge", "bgs-r":"Kopfmontage BGS mit Rollenschiene", "bs-g":"Kopfmontage BS mit Gestänge", "bs-r":"Kopfmontage BS mit Rollenschiene" },
  oeffnungswinkel:{ "80":"80°","90":"90°","110":"110°","120":"120° (max.)" },
  notfunktion:   { akku:"Akku-Backup", notstrom:"Notstromversorgung", keine:"Keine" },
  farbgebung:    { silber:"Silber (Standard)", weiss:"Weiß RAL 9016", bronze:"Bronze/Braun", individuell:"RAL individuell" },
  sensorFarbe:   { alu:"Aluminium", weiss:"Weiß", schwarz:"Schwarz" },
};
const ZL = {
  radar:"Radar-Sensor",taster:"Aktivierungstaster",schluessel:"Schlüsselschalter",
  nottaster:"Nottaster",profil:"Profil-Zylinder",zutrittskontrolle:"Zutrittskontrolle",
  gegensprechanlage:"Gegensprechanlage",brandmeldeanlage:"BMA-Anbindung",
  rauchdetektor:"Rauchmelder",fingerprint:"Fingerprint-Leser",
};
const SML = { bandseite:"Bandseite", bandgegenseite:"Bandgegenseite", beidseitig:"Beidseitig" };
const SENSORIK_LM = {
  irs4:"BEA IRS4 (4SAFE) · Sensorleiste",
  flatscan:"BEA LZR-FLATSCAN SW · Laserscanner",
  flatscan3d:"BEA LZR-FLATSCAN 3D SW · 3D-Laserscanner",
  keine:"Keine Absicherungssensorik",
};
const PFLICHT_D = ["modell","fluegelanzahl","tuerart","betriebsart","betriebsmodus","montageart"];
const PFLICHT_G = ["variante","tuerart","betriebsart","montageart"];

// ─── State ────────────────────────────────────────────────────────────────────
let S = {
  produkt:"dormakaba",
  // dormakaba
  modell:"",fluegelanzahl:"",tuerart:"",betriebsart:"",betriebsmodus:"",montageart:"",
  verkleidung:"",oeffnungswinkel:"",windlast:"",tuerbreite:"",tuergewicht:"",
  farbgebung:"",notfunktion:"",
  // geze
  variante:"",g_tuerart:"",g_betriebsart:"",g_montageart:"",g_oeffnungswinkel:"",
  g_tuerbreite:"",g_tuergewicht:"",g_farbgebung:"",g_notfunktion:"",
  g_optionen:[],
  // shared
  zubehoer:[],sensorik:"",sensorMontage:[],sensorFarbe:"",
  showSummary:false,
};
function set(k,v){ S=Object.assign({},S,{[k]:v}); render(); }
function toggleArr(k,v){
  var a=S[k]||[];
  S=Object.assign({},S,{[k]:a.includes(v)?a.filter(function(x){return x!==v}):[...a,v]});
  render();
}
function isD(){ return S.produkt==="dormakaba"; }
function selClass(){ return isD()?"sel-d":"sel-g"; }
function accentColor(){ return isD()?"#D95E1F":"#005A9C"; }

// ─── Derived ──────────────────────────────────────────────────────────────────
function getEmpfehlungD(){
  var b=parseInt(S.tuerbreite),g=parseInt(S.tuergewicht);
  if(!b&&!g) return null;
  if(b>1100||g>160) return {modell:"ED 250",warn:true,reason:"Türblatt "+(b>1100?b+" mm":g+" kg")+" → ED 250 erforderlich"};
  return {modell:"ED 100",warn:false,reason:"Maße im Bereich ED 100 (≤ 1100 mm / ≤ 160 kg)"};
}
function getEmpfehlungG(){
  var g=parseInt(S.g_tuergewicht);
  if(!g) return null;
  if(g>600) return {warn:true,reason:"Türgewicht "+g+" kg überschreitet max. 600 kg"};
  return {warn:false,reason:"Türgewicht "+g+" kg im Bereich Powerturn (max. 600 kg)"};
}

// ─── HTML Builder ─────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function radio(label,hint,field,options,req){
  var val=S[field]||"",sc=selClass();
  return '<div class="field">'+
    '<div class="field-label">'+label+(req?'<span class="field-req">*</span>':'')+
    '</div>'+(hint?'<p class="field-hint">'+hint+'</p>':'')+
    '<div class="btn-group">'+
    options.map(function(o){
      var s=val===o.value;
      return '<button class="opt-btn'+(s?' '+sc:'')+'" data-action="radio" data-field="'+field+'" data-value="'+o.value+'">'+
        (o.icon?'<span>'+o.icon+'</span>':'')+
        '<span>'+o.label+'</span>'+
        (o.sub?'<span class="opt-sub">('+o.sub+')</span>':'')+
        '</button>';
    }).join('')+'</div></div>';
}

function checkbox(label,hint,field,options){
  var vals=S[field]||[],sc=selClass();
  return '<div class="field">'+
    '<div class="field-label">'+label+'</div>'+
    (hint?'<p class="field-hint">'+hint+'</p>':'')+
    '<div class="btn-group">'+
    options.map(function(o){
      var c=vals.includes(o.value);
      return '<button class="opt-btn'+(c?' '+sc:'')+'" data-action="chk" data-field="'+field+'" data-value="'+o.value+'">'+
        '<span class="chk-box">'+(c?'✓':'')+'</span>'+
        (o.icon?'<span>'+o.icon+'</span>':'')+o.label+'</button>';
    }).join('')+'</div></div>';
}

function numInput(label,hint,field,unit,ph){
  return '<div class="field">'+
    '<div class="field-label">'+label+'</div>'+
    (hint?'<p class="field-hint">'+hint+'</p>':'')+
    '<div class="num-row">'+
    '<input type="number" class="num-input" data-field="'+field+'" value="'+esc(S[field])+'" placeholder="'+ph+'" inputmode="numeric">'+
    (unit?'<span class="num-unit">'+unit+'</span>':'')+
    '</div></div>';
}

function sec(title,icon,body){
  var cls=isD()?"dormakaba":"geze";
  return '<div class="section"><div class="sec-hdr '+cls+'"><span class="sec-icon">'+icon+'</span>'+
    '<span class="sec-title">'+title+'</span></div><div class="sec-body">'+body+'</div></div>';
}

function alertBox(type,icon,head,body){
  return '<div class="alert alert-'+type+'"><span class="alert-icon">'+icon+'</span>'+
    '<div><div class="alert-head '+type+'">'+head+'</div>'+
    (body?'<div class="alert-body">'+body+'</div>':'')+
    '</div></div>';
}

function sensorCards(){
  var sensors=[
    {value:"irs4",  icon:"📏",name:"IRS4 (4SAFE)",     tag:"Aktiv-Infrarot · Sensorleiste",   merkmale:["Türblattmontage (mitfahrend)","3D-Schutzfeld bis 3 m Höhe","Bis 6 Module reihenschaltbar","Geeignet für Rollstuhlfahrer","TÜV-zertifiziert"]},
    {value:"flatscan",icon:"🔴",name:"LZR-FLATSCAN SW", tag:"Laser · 2D-Scanner",             merkmale:["170 Messpunkte","1 Modul sichert gesamte Türbreite","Bis 1600 mm Türbreite","Winkeleinstellung 2°–10°","Master-Slave-kompatibel"]},
    {value:"flatscan3d",icon:"🔷",name:"LZR-FLATSCAN 3D SW",tag:"Laser · 3D-Volumen-Scanner",merkmale:["4 volumetrische Laservorhänge","Band- & Bandgegenseite + Schließkanten","Hygienische Aktivierungsfunktion","Dynamischer Fingerschutz","Höchste Sicherheitsstufe"]},
    {value:"keine", icon:"✕",  name:"Keine Sensorik",  tag:"Nicht erforderlich",              merkmale:["Nur bei internen Türen","Risikoanalyse erforderlich"]},
  ];
  var sc=selClass();
  return '<div class="sensor-list">'+
    sensors.map(function(s){
      var sel=S.sensorik===s.value;
      return '<div class="sensor-card'+(sel?' '+sc:'')+'" data-action="radio" data-field="sensorik" data-value="'+s.value+'">'+
        '<div class="sensor-card-hdr">'+
        '<div class="sensor-card-left"><span class="sensor-icon">'+s.icon+'</span>'+
        '<div><div class="sensor-name">'+s.name+'</div><div class="sensor-tag">'+s.tag+'</div></div></div>'+
        '<div class="sensor-check">'+(sel?'✓':'')+'</div></div>'+
        '<ul class="sensor-merkmale">'+s.merkmale.map(function(m){return '<li>'+m+'</li>';}).join('')+'</ul>'+

  var pct=Math.round(filled/pflicht.length*100);
  var complete=filled===pflicht.length;
  var cls=isD()?'dormakaba':'geze';
  var ac=isD()?'#D95E1F':'#005A9C';

  // Header
  var hdr=document.getElementById('hdr');
  hdr.className=cls;
  document.getElementById('hdr-title').textContent=isD()?'dormakaba ED 100/250':'GEZE Powerturn';
  document.getElementById('hdr-sub').textContent='Drehtürantrieb · Konfiguration';
  document.getElementById('prog-ring').style.background='conic-gradient('+ac+' '+(filled/pflicht.length*360)+'deg, #2D4B66 0deg)';
  document.getElementById('prog-inner').className='';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-fill').style.background=ac;

  // Product switcher
  document.getElementById('prod-switcher').innerHTML=
    '<div class="prod-tab'+(isD()?' active-dormakaba':'')+'" data-action="prod" data-value="dormakaba">'+
    '<span class="prod-tab-icon">🔧</span>'+
    '<span class="prod-tab-name">dormakaba</span>'+
    '<span class="prod-tab-sub">ED 100 / ED 250</span></div>'+
    '<div class="prod-tab'+(isD()?'':' active-geze')+'" data-action="prod" data-value="geze">'+
    '<span class="prod-tab-icon">⚙️</span>'+
    '<span class="prod-tab-name">GEZE</span>'+
    '<span class="prod-tab-sub">Powerturn</span></div>';

  // Main content
  var html=isD()?buildDormakaba():buildGeze();

  // Action button
  html+='<button class="big-btn '+cls+'" id="summary-btn"'+(complete?'':' disabled')+'>'+
    (complete?(S.showSummary?'▲ Konfiguration schließen':'✅ Konfiguration anzeigen'):
    'Noch '+(pflicht.length-filled)+' Pflichtfeld'+(pflicht.length-filled!==1?'er':'')+' ausfüllen')+
    '</button>';

  if(S.showSummary&&complete) html+=buildSummary();

  document.getElementById('content').innerHTML=html;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function handleClick(ev){
  var t=ev.target;
  var btn=t.closest('[data-action]');
  if(!btn){
    if(t.closest('#summary-btn')&&!t.closest('#summary-btn').disabled){ S.showSummary=!S.showSummary; render(); }
    if(t.closest('#pdf-btn')) exportPDF();
    return;
  }
  var action=btn.dataset.action,field=btn.dataset.field,value=btn.dataset.value;
  if(action==='prod'){ S.produkt=value; S.showSummary=false; render(); return; }
  if(action==='radio') set(field,value);
  if(action==='chk')   toggleArr(field,value);
}
document.getElementById('prod-switcher').addEventListener('click',handleClick);
document.getElementById('content').addEventListener('click',handleClick);
document.getElementById('content').addEventListener('change',function(ev){
  if(ev.target.classList.contains('num-input')) set(ev.target.dataset.field,ev.target.value);
});
document.getElementById('install-close').addEventListener('click',function(){
  document.getElementById('install-banner').classList.add('hidden');
});
if(!/iPad|iPhone|iPod/.test(navigator.userAgent)){
  document.getElementById('install-banner').classList.add('hidden');
}

// ─── Manifest ─────────────────────────────────────────────────────────────────
(function(){
  var m={name:"Türantrieb Konfigurator",short_name:"Konfigurator",display:"standalone",
         start_url:".",background_color:"#1A2D44",theme_color:"#1A2D44",orientation:"portrait"};
  var l=document.createElement("link");l.rel="manifest";
  l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/json"}));
  document.head.appendChild(l);
})();

render();
</script>
