<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STOBER Schiebetür">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#001B43">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231A2D44'/%3E%3Crect x='40' y='60' width='20' height='392' rx='6' fill='%23D95E1F'/%3E%3Ctext x='75' y='310' font-family='Arial' font-weight='900' font-size='105' fill='white'%3ESCH%3C/text%3E%3C/svg%3E">
  <title>STOBER – Schiebetür Konfigurator</title>
<style>
  :root{
    --bg:#F2F4F7;--panel:#fff;--primary:#091636;--accent:#001B43;
    --accent-l:#EEF2F8;--border:#D2DAE3;--muted:#6B7A8D;
    --ok:#2A7A4B;--ok-l:#EAF7EF;--warn:#B45309;--warn-l:#FEF3C7;
    --geze:#005A9C;--geze-l:#E6F0FA;
    --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{height:-webkit-fill-available}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--primary);
       min-height:100vh;padding-bottom:calc(var(--safe-bot)+24px);-webkit-font-smoothing:antialiased}
  button{-webkit-appearance:none;font-family:inherit;cursor:pointer}
  input[type=number]{font-size:16px;-moz-appearance:textfield;font-family:inherit}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

  #hdr{padding-top:calc(var(--safe-top)+14px);padding-bottom:14px;padding-left:18px;padding-right:18px;
       display:flex;align-items:center;justify-content:space-between;transition:background .3s}
  #hdr.dk{background:#1A2D44}  #hdr.gz{background:#005A9C}
  #hdr-bar{width:5px;height:34px;border-radius:2px;flex-shrink:0;transition:background .3s}
  #hdr.dk #hdr-bar{background:#D95E1F}  #hdr.gz #hdr-bar{background:#FFC72C}
  #hdr-title{color:#fff;font-weight:800;font-size:17px;letter-spacing:-.02em;margin-left:10px}
  #hdr-sub{color:rgba(255,255,255,.6);font-size:12px;margin-top:1px;margin-left:10px}
  #prog-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  #prog-inner{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  #hdr.dk #prog-inner{background:#1A2D44}  #hdr.gz #prog-inner{background:#005A9C}
  #prog-pct{color:#fff;font-size:11px;font-weight:700}
  #prog-bar{height:3px;background:var(--border)}
  #prog-fill{height:100%;transition:width .3s,background .3s}
  #install-banner{background:#0A84FF;padding:12px 16px;display:flex;align-items:center;gap:10px}
  #install-banner.hidden{display:none}
  #install-close{background:rgba(255,255,255,.2);border:none;border-radius:99px;padding:4px 10px;color:#fff;font-size:13px;font-weight:600;min-height:32px}

  /* Product tabs */
  #prod-sw{padding:14px 14px 0;display:flex;gap:10px}
  .ptab{flex:1;padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:var(--panel);
        display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;transition:.15s}
  .ptab.ak-dk{border-color:#D95E1F;background:#FFF5EF}
  .ptab.ak-gz{border-color:#FFC72C;background:#FFFAEE}
  .ptab-icon{font-size:22px}
  .ptab-name{font-weight:700;font-size:13px;color:var(--primary)}
  .ptab-sub{font-size:11px;color:var(--muted)}
  .ptab.ak-dk .ptab-name{color:#D95E1F}
  .ptab.ak-gz .ptab-name{color:#7A5000}

  #content{padding:14px 14px 0}

  .alert{border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
  .alert-ok{background:var(--ok-l);border:1px solid rgba(42,122,75,.25)}
  .alert-warn{background:var(--warn-l);border:1px solid rgba(180,83,9,.25)}
  .alert-info{background:#E8F0FE;border:1px solid rgba(26,45,68,.15)}
  .alert-gz{background:#FFC72C22;border:1px solid rgba(255,199,44,.4)}
  .alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}
  .alert-head{font-weight:700;font-size:14px}
  .alert-head.ok{color:var(--ok)}.alert-head.warn{color:var(--warn)}
  .alert-head.info{color:var(--primary)}.alert-head.gz{color:#7A5000}
  .alert-body{color:var(--muted);font-size:12px;margin-top:2px}

  .section{background:var(--panel);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(26,45,68,.08)}
  .sec-hdr{padding:13px 18px;display:flex;align-items:center;gap:10px}
  .sec-hdr.dk{background:#1A2D44}  .sec-hdr.gz{background:#005A9C}
  .sec-icon{font-size:18px}
  .sec-title{color:#fff;font-weight:700;font-size:13px;letter-spacing:.05em;text-transform:uppercase}
  .sec-body{padding:16px}

  .field{margin-bottom:18px}
  .field:last-child{margin-bottom:0}
  .field-label{font-weight:600;font-size:14px;color:var(--primary);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .field-req{color:var(--accent);font-size:12px}
  .field-hint{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4}
  .num-row{display:flex;align-items:center;gap:8px}
  .num-input{padding:12px 14px;border-radius:8px;border:2px solid var(--border);font-size:16px;width:130px;color:var(--primary);background:var(--panel);outline:none}
  .num-input:focus{border-color:var(--accent)}
  .txt-input{padding:12px 14px;border-radius:8px;border:2px solid var(--border);font-size:16px;width:100%;color:var(--primary);background:var(--panel);outline:none;font-family:inherit}
  .txt-input:focus{border-color:var(--accent)}
  .num-unit{color:var(--muted);font-size:14px;font-weight:500}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0}

  .btn-group{display:flex;flex-wrap:wrap;gap:8px}
  .opt-btn{padding:10px 14px;border-radius:8px;border:2px solid var(--border);background:var(--panel);color:var(--muted);
           font-weight:500;font-size:13px;display:flex;align-items:center;gap:5px;min-height:44px;transition:.12s}
  .opt-btn.sel-dk{border-color:#D95E1F;background:#FFF5EF;color:#D95E1F;font-weight:700}
  .opt-btn.sel-gz{border-color:#FFC72C;background:#FFFAEE;color:#7A5000;font-weight:700}
  .opt-sub{font-size:11px;opacity:.75;font-weight:400}
  .chk-box{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);background:transparent;
           display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:900;color:transparent;transition:.12s}
  .opt-btn.sel-dk .chk-box{background:#D95E1F;border-color:#D95E1F;color:#fff}
  .opt-btn.sel-gz .chk-box{background:#FFC72C;border-color:#FFC72C;color:#001B43}

  /* Modell cards */
  .modell-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .modell-card{border:2px solid var(--border);border-radius:10px;padding:12px;background:var(--panel);cursor:pointer;transition:.12s}
  .modell-card.sel-dk{border-color:#D95E1F;background:#FFF5EF}
  .modell-card.sel-gz{border-color:#FFC72C;background:#FFFAEE}
  .modell-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .modell-name{font-weight:800;font-size:13px;color:var(--primary)}
  .modell-card.sel-dk .modell-name{color:#D95E1F}
  .modell-card.sel-gz .modell-name{color:#7A5000}
  .modell-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;display:inline-block;margin-bottom:5px}
  .modell-card.sel-dk .modell-badge{background:#D95E1F;color:#fff}
  .modell-card.sel-gz .modell-badge{background:#FFC72C;color:#001B43}
  .modell-badge:not(.sel-dk):not(.sel-gz){background:var(--primary);color:#fff}
  .modell-specs{font-size:11px;color:var(--muted);line-height:1.6}
  .modell-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:900;color:transparent;transition:.12s}
  .modell-card.sel-dk .modell-check{background:#D95E1F;border-color:#D95E1F;color:#fff}
  .modell-card.sel-gz .modell-check{background:#FFC72C;border-color:#FFC72C;color:#001B43}

  .big-btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;
           min-height:52px;display:flex;align-items:center;justify-content:center;gap:8px}
  .big-btn:disabled{background:var(--border);cursor:not-allowed}
  .big-btn.dk{background:#D95E1F}  .big-btn.gz{background:#FFC72C;color:#001B43}  .big-btn.dark{background:#1A2D44}

  #summary-panel{margin-top:14px;background:var(--panel);border-radius:12px;overflow:hidden;display:none}
  #summary-panel.visible{display:block}
  #summary-panel.dk{border:2px solid #D95E1F}  #summary-panel.gz{border:2px solid #FFC72C}
  .sum-hdr{padding:12px 16px;color:#fff;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
  .sum-hdr.dk{background:#D95E1F}  .sum-hdr.gz{background:#FFC72C;color:#001B43}
  .sum-body{padding:16px}
  .sum-table{width:100%;border-collapse:collapse;font-size:13px}
  .sum-table tr{border-bottom:1px solid var(--border)}
  .sum-table td{padding:8px 4px;vertical-align:top}
  .sum-table td:first-child{color:var(--muted);font-weight:500;width:42%}
  .sum-table td:last-child{font-weight:600;color:var(--primary)}
  .norm-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
  .norm-badge{padding:3px 10px;color:#fff;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary)}
  .norm-badge.ok{background:var(--ok)}  .norm-badge.warn{background:var(--warn)}
  .pdf-hint{font-size:11px;color:var(--muted);margin-top:8px;text-align:center}
</style>
</head>
<body>
<div id="hdr" class="dk">
  <div style="display:flex;align-items:center">
    <div id="hdr-bar"></div>
    <div><div style="display:flex;align-items:center;gap:8px"><span style="background:#577496;color:#fff;font-weight:900;font-size:11px;padding:2px 7px;border-radius:3px;letter-spacing:.04em">STOBER</span><span id="hdr-title" style="color:#fff;font-weight:800;font-size:16px;letter-spacing:-.02em">Schiebetür Konfigurator</span></div><div id="hdr-sub">Automatische Schiebetür &middot; Konfiguration</div></div>
  </div>
  <div id="prog-ring"><div id="prog-inner"><span id="prog-pct">0%</span></div></div>
</div>
<div id="install-banner">
  <span style="font-size:20px;flex-shrink:0">📲</span>
  <div style="flex:1"><div style="color:#fff;font-weight:700;font-size:13px">Als App installieren</div>
  <div style="color:rgba(255,255,255,.85);font-size:12px">Tippe auf <b>Teilen ⬆</b> &rarr; „Zum Home-Bildschirm"</div></div>
  <button id="install-close">✕</button>
</div>
<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
<div id="proj-data"></div>
<div id="prod-sw"></div>
<div id="content"></div>

<script>
// ─── Data ─────────────────────────────────────────────────────────────────────
const DK_MODELLE=[
  {value:"es250pro",   name:"ES 250 PRO",     badge:"Standard",         fluegel:"1x / 2x 125 kg", breite:"700–3000 mm",  fst:false},
  {value:"es250fst",   name:"ES 250 PRO FST", badge:"Fluchtweg",        fluegel:"1x / 2x 125 kg", breite:"700–3000 mm",  fst:true},
  {value:"es400pro",   name:"ES 400 PRO",     badge:"Schwerlast",       fluegel:"1x 250 / 2x 200 kg",breite:"700–3000 mm",fst:false},
  {value:"es400fst",   name:"ES 400 PRO FST", badge:"Schwerlast+FST",   fluegel:"1x 250 / 2x 200 kg",breite:"700–3000 mm",fst:true},
  {value:"es250t",     name:"ES 250 PRO T",   badge:"Teleskop",         fluegel:"2x / 4x 65 kg",  breite:"800–4000 mm",  fst:false},
  {value:"es250tfst",  name:"ES 250 PRO T FST",badge:"Teleskop+FST",   fluegel:"2x / 4x 65 kg",  breite:"800–4000 mm",  fst:true},
  {value:"es400t",     name:"ES 400 PRO T",   badge:"Teleskop+SL",      fluegel:"2x / 4x 100 kg", breite:"800–4000 mm",  fst:false},
  {value:"es400tfst",  name:"ES 400 PRO T FST",badge:"Teleskop+SL+FST",fluegel:"2x / 4x 100 kg", breite:"800–4000 mm",  fst:true},
];
const GZ_MODELLE=[
  {value:"ecdrive",    name:"ECdrive T2",      badge:"Standard",        fluegel:"1x / 2x bis 140 kg",breite:"700–3000 mm",fst:false,rd:false,rc:false,tl:false},
  {value:"ecdrivefr",  name:"ECdrive T2-FR",   badge:"Fluchtweg",       fluegel:"1x / 2x bis 140 kg",breite:"700–3000 mm",fst:true, rd:false,rc:false,tl:false},
  {value:"slimdrive",  name:"Slimdrive SL",    badge:"7 cm Bauhöhe",    fluegel:"bis 120 kg/Flügel",breite:"bis 3000 mm", fst:false,rd:false,rc:false,tl:false},
  {value:"slimfr",     name:"Slimdrive SL-FR", badge:"Fluchtweg",       fluegel:"bis 120 kg/Flügel",breite:"bis 3000 mm", fst:true, rd:false,rc:false,tl:false},
  {value:"slimntfr",   name:"Slimdrive SL-NT-FR",badge:"Nacht+FST",    fluegel:"bis 120 kg/Flügel",breite:"bis 3000 mm", fst:true, rd:false,rc:false,tl:false},
  {value:"slimrc2",    name:"Slimdrive SL-RC2",badge:"Einbruchschutz",  fluegel:"bis 120 kg/Flügel",breite:"bis 3000 mm", fst:false,rd:false,rc:true, tl:false},
  {value:"slimrd",     name:"Slimdrive SL-RD", badge:"Rauchschutz",     fluegel:"bis 120 kg/Flügel",breite:"bis 3000 mm", fst:false,rd:true, rc:false,tl:false},
  {value:"slimt",      name:"Slimdrive SLT",   badge:"Teleskop",        fluegel:"bis 320 kg gesamt",breite:"bis 3600 mm", fst:false,rd:false,rc:false,tl:true},
  {value:"powerdrive", name:"Powerdrive PL",   badge:"Schwerlast",      fluegel:"bis 200 kg/Flügel",breite:"bis 3000 mm", fst:false,rd:false,rc:false,tl:false},
  {value:"powerdrfr",  name:"Powerdrive PL-FR",badge:"Schwerlast+FST",  fluegel:"bis 200 kg/Flügel",breite:"bis 3000 mm", fst:true, rd:false,rc:false,tl:false},
];

const LM_DK={
  fluegelanzahl:{"1":"1-flügelig","2":"2-flügelig","4":"4-flügelig (Teleskop)"},
  tuertyp:{standard:"Standardschiebetür",fst:"Flucht- und Rettungsweg (FST)",green:"Energiespar (Green/GCprofile Therm)"},
  betriebsmodus:{auto:"Vollautomatik",low:"Low-Energy",perm:"Permanentöffnung",teil:"Teilöffnung"},
  montageart:{wand:"Wandmontage",nische:"Nischenmontage",glas:"Glastürmontage",decke:"Deckenmontage"},
  verriegelung:{keine:"Keine",svp:"SVP 2000 Antipanik",motor:"Motorschloss",elektro:"Elektroschloss",svp_rc:"SVP + RC2/RC3"},
  profil:{standard:"Standard-Profil",flex:"ST FLEX (feingerahmt)",green:"ST PRO Green (Energiespar)",secure:"ST FLEX Secure (RC2/RC3)"},
  farbgebung:{silber:"Silber (Eloxal)",weiss:"Weiß RAL 9016",bronze:"Bronze",schwarz:"Schwarz RAL 9005",individuell:"RAL individuell"},
  oeffnungsgeschw:{standard:"Standard",erhoehen:"Erhöht",reduziert:"Reduziert (leise)"},
  notfunktion:{akku:"Akku-Backup",nein:"Keine"},
};
const LM_GZ={
  fluegelanzahl:{"1":"1-flügelig","2":"2-flügelig","4":"4-flügelig (Teleskop)"},
  tuertyp:{standard:"Standardschiebetür",fst:"Flucht- und Rettungsweg (FR)",rd:"Rauchschutztür (RD)",rc2:"Einbruchschutz RC2"},
  betriebsmodus:{auto:"Vollautomatik",low:"Low-Energy",nacht:"Nacht (verriegelt)",perm:"Permanentöffnung",teil:"Teilöffnung"},
  montageart:{wand:"Wandmontage",sturz:"Sturzmontage",pfosten:"Pfosten-Riegel-Montage",glas:"Glaswand / ISO-Glasbeschlag",boden:"Bodenschloss-Montage"},
  verriegelung:{keine:"Keine",stangen:"Stangenverriegelung (RC2)",motor:"Motorschloss",elektro:"Elektroschloss"},
  profil:{fein:"Feingerahmtes Profilsystem (Iso/Mono)",gctherm:"GCprofile Therm (Energiespar)",esg:"ESG-Klemmprofil",rahmen:"Bauseitiger Rahmenflügel",holz:"Holzflügel (bauseitig)"},
  farbgebung:{silber:"Silber (Eloxal)",weiss:"Weiß RAL 9016",bronze:"Bronze/Braun",schwarz:"Schwarz RAL 9005",individuell:"RAL individuell"},
  notfunktion:{akku:"Integrierter Akku (Notöffnung/-schließung)",nein:"Keine"},
};

const ZL_DK={
  dpi:"Door Pilot Interface (App-Steuerung)",sensorverk:"Sensorverkleidung (integriert)",
  rauchschalter:"Rauchschalter-Anbindung",bma:"BMA-Anbindung",nebenkante:"Nebenkantenabsicherung",
  teiloeff:"Teilöffnungsmodul",schleuse:"Schleusen-/Koppelbetrieb",potausgl:"Potentialausgleich Türflügel",
};
const ZL_GZ={
  bacnet:"BACnet-Integration (Gebäudeautomation)",geze_conn:"GEZEconnects (Bluetooth/App)",
  rauch:"Rauchschalter-Anbindung",bma:"BMA-Anbindung",nebenkante:"Nebenkantenabsicherung",
  schleuse:"Schleusen-/Koppelbetrieb",teiloeff:"Teilöffnungsmodul",can:"CAN-Erweiterungsmodul",
};

const SENSORIK_LM={
  ixiod:"BEA IXIO-D · Radar + IR-Vorhang (Öffnung + Absicherung)",
  ixiost:"BEA IXIO-ST · Infrarot-Vorhang (Absicherung Schließkante)",
  ixiodt3:"BEA IXIO-DT3 · Dualtechnologie Radar + IR (FST-geeignet)",
  ixiodp3:"BEA IXIO-DP3 · Radar + Aktiv-Infrarot Kombisensor",
  keine:"Keine zusätzliche Absicherungssensorik",
};
const SENSOR_MONTAGE_LM={hauptschliess:"Hauptschließkante",nebenschliess:"Nebenschließkante",beidseitig:"Beidseitig (Haupt + Neben)"};
const PFLICHT_DK=["modell","fluegelanzahl","tuertyp","betriebsmodus","montageart"];
const PFLICHT_GZ=["gz_modell","gz_fluegelanzahl","gz_tuertyp","gz_betriebsmodus","gz_montageart"];

// ─── State ────────────────────────────────────────────────────────────────────
let S={
  produkt:"dk",
  // dormakaba
  modell:"",fluegelanzahl:"",tuertyp:"",betriebsmodus:"",montageart:"",
  oeffnungsbreite:"",fluegelgewicht:"",verriegelung:"",profil:"",farbgebung:"",
  notfunktion:"",oeffnungsgeschw:"",aktivierung:"",zubehoer:[],motioniq:"",
  // geze
  gz_modell:"",gz_fluegelanzahl:"",gz_tuertyp:"",gz_betriebsmodus:"",gz_montageart:"",
  gz_oeffnungsbreite:"",gz_fluegelgewicht:"",gz_verriegelung:"",gz_profil:"",gz_farbgebung:"",
  gz_notfunktion:"",gz_optionen:[],gz_aktivierung:"",
  // shared sensorik
  sensorik:"",sensorMontage:[],
  // projekt
  ag_firma:"",ag_ansprechpartner:"",ag_telefon:"",ag_email:"",
  bs_strasse:"",bs_plzort:"",bs_objekt:"",bs_bauteil:"",
  gpsLoading:false,gpsError:"",
  showSummary:false,
};
function set(k,v){S=Object.assign({},S,{[k]:v});render();}
function toggleArr(k,v){var a=S[k]||[];S=Object.assign({},S,{[k]:a.includes(v)?a.filter(function(x){return x!==v}):[...a,v]});render();}
function isDK(){return S.produkt==="dk";}
function sc(){return isDK()?"sel-dk":"sel-gz";}
function ac(){return isDK()?"#D95E1F":"#FFC72C";}

// ─── Derived ──────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function getDKModell(){return DK_MODELLE.find(function(m){return m.value===S.modell;});}
function getGZModell(){return GZ_MODELLE.find(function(m){return m.value===S.gz_modell;});}

function getEmp(){
  if(isDK()){
    var b=parseInt(S.oeffnungsbreite),g=parseInt(S.fluegelgewicht);
    var m=getDKModell(); if(!m||(!b&&!g)) return null;
    var maxG=m.value.startsWith("es400")?250:125;
    var maxB=3000;
    if(g>maxG||b>maxB) return {warn:true,reason:"Werte überschreiten Modell-Maximum ("+maxG+" kg / "+maxB+" mm)"};
    if(g&&b) return {warn:false,reason:"Werte im zulässigen Bereich für "+m.name};
  } else {
    var bg=parseInt(S.gz_fluegelgewicht);
    var mg=getGZModell(); if(!mg||!bg) return null;
    var maxGG=mg.value.startsWith("power")?200:mg.value==="slimt"?160:140;
    if(bg>maxGG) return {warn:true,reason:"Flügelgewicht "+bg+" kg überschreitet Maximum ("+maxGG+" kg) für "+mg.name};
    return {warn:false,reason:"Flügelgewicht "+bg+" kg im zulässigen Bereich für "+mg.name};
  }
  return null;
}

function radio(label,hint,field,options,req){

        (o.sub?'<span class="opt-sub">('+o.sub+')</span>':'')+

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  var pflicht=isDK()?PFLICHT_DK:PFLICHT_GZ;
  var filled=pflicht.filter(function(k){return !!S[k];}).length;
  var pct=Math.round(filled/pflicht.length*100);
  var complete=filled===pflicht.length;
  var cls=isDK()?'dk':'gz';

  document.getElementById('hdr').className=cls;
  document.getElementById('hdr-title').textContent=isDK()?'dormakaba ES PROLINE':'GEZE Schiebetür';
  document.getElementById('prog-ring').style.background='conic-gradient('+ac()+' '+(filled/pflicht.length*360)+'deg,#2D4B66 0deg)';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-fill').style.background=ac();
  document.getElementById('proj-data').innerHTML=buildProjectData();

  // Product switcher
  document.getElementById('prod-sw').innerHTML=
    '<div class="ptab'+(isDK()?' ak-dk':'')+'" data-action="prod" data-value="dk">'+
    '<span class="ptab-icon">🏗️</span><span class="ptab-name">dormakaba</span><span class="ptab-sub">ES PROLINE</span></div>'+
    '<div class="ptab'+(isDK()?'':' ak-gz')+'" data-action="prod" data-value="gz">'+
    '<span class="ptab-icon">⚙️</span><span class="ptab-name">GEZE</span><span class="ptab-sub">ECdrive / Slimdrive / Powerdrive</span></div>';

  var html=isDK()?buildDK():buildGZ();
  html+='<button class="big-btn '+cls+'" id="summary-btn"'+(complete?'':' disabled')+'>'+
    (complete?(S.showSummary?'▲ Konfiguration schließen':'✅ Konfiguration anzeigen'):
    'Noch '+(pflicht.length-filled)+' Pflichtfeld'+(pflicht.length-filled!==1?'er':'')+' ausfüllen')+
    '</button>';
  if(S.showSummary&&complete) html+=buildSummary();
  document.getElementById('content').innerHTML=html;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function handleClick(ev){
  var btn=ev.target.closest('[data-action]');
  if(!btn){
    if(ev.target.closest('#summary-btn')&&!ev.target.closest('#summary-btn').disabled){S.showSummary=!S.showSummary;render();}
    if(ev.target.closest('#pdf-btn')) exportPDF();
    return;
  }
  var a=btn.dataset.action,f=btn.dataset.field,v=btn.dataset.value;
  if(a==='prod'){S.produkt=v;S.showSummary=false;render();return;}
  if(a==='radio') set(f,v);
  if(a==='chk')   toggleArr(f,v);
}
function handleGPS(){
  if(!navigator.geolocation){
    S=Object.assign({},S,{gpsError:'GPS nicht verfügbar auf diesem Gerät.'});render();return;
  }
  S=Object.assign({},S,{gpsLoading:true,gpsError:''});render();
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude,lon=pos.coords.longitude;
      fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&addressdetails=1&accept-language=de')
        .then(function(r){return r.json();})
        .then(function(d){
          var a=d.address||{};
          var road=a.road||a.pedestrian||a.footway||a.path||a.street||'';
          var nr=a.house_number?(' '+a.house_number):'';
          var city=a.city||a.town||a.village||a.municipality||a.suburb||'';
          var plz=a.postcode||'';
          S=Object.assign({},S,{
            bs_strasse:(road+nr).trim(),
            bs_plzort:(plz+(city?' '+city:'')).trim(),
            gpsLoading:false,gpsError:''
          });render();
        })
        .catch(function(){
          S=Object.assign({},S,{gpsLoading:false,gpsError:'Adresse konnte nicht ermittelt werden. Internetverbindung prüfen.'});render();
        });
    },
    function(err){
      var msg=err.code===1?'GPS-Zugriff verweigert. Bitte in den Einstellungen erlauben.':
              err.code===2?'Standort konnte nicht ermittelt werden.':
              'GPS-Abfrage abgebrochen (Timeout).';
      S=Object.assign({},S,{gpsLoading:false,gpsError:msg});render();
    },
    {enableHighAccuracy:true,timeout:12000,maximumAge:0}
  );
}

document.getElementById('prod-sw').addEventListener('click',handleClick);
document.getElementById('content').addEventListener('click',handleClick);
document.getElementById('content').addEventListener('change',function(ev){
  if(ev.target.classList.contains('num-input')) set(ev.target.dataset.field,ev.target.value);
});
document.getElementById('proj-data').addEventListener('change',function(ev){
  if(ev.target.classList.contains('txt-input')||ev.target.classList.contains('num-input')){
    set(ev.target.dataset.field,ev.target.value);
  }
});
document.getElementById('proj-data').addEventListener('click',function(ev){
  var btn=ev.target.closest('[data-action="gps"]');
  if(btn&&!btn.disabled) handleGPS();
});
document.getElementById('install-close').addEventListener('click',function(){
  document.getElementById('install-banner').classList.add('hidden');
});
if(!/iPad|iPhone|iPod/.test(navigator.userAgent)) document.getElementById('install-banner').classList.add('hidden');
